<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="description" content="Stone Cold Detailing | Experience showroom quality with our signature frozen perfection. Premium mobile automotive care at your doorstep." />
    <meta name="keywords" content="Stone Cold Detailing, car detailing, auto detail, luxury car wash, mobile detailing, ceramic coating" />
    <title>Stone Cold Detailing | Frozen Perfection. Metallic Shine.</title>
    <!-- Security Meta Fallback -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <!-- Cache Control Hints -->
    <meta http-equiv="Cache-Control" content="max-age=3600, must-revalidate">
  </head>
  <body>
    <div id="root"></div>
    <script>
        window.addEventListener('error', (event) => {
          const isOurAppError = event.filename && event.filename.startsWith(window.location.origin);
          if (isOurAppError) {
            navigator.sendBeacon('/api/client-errors', JSON.stringify({
              message: event.message,
              url: window.location.href,
              userAgent: navigator.userAgent,
              source: event.filename,
              lineno: event.lineno,
              colno: event.colno,
              stack: event.error ? event.error.stack : null,
              timestamp: new Date().toISOString()
            }));
          }
        }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
